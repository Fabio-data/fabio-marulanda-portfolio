<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 625" width="1000" height="625" role="img" aria-label="Importancia de variables con SHAP y tarjeta de acción sugerida del modelo de desistimiento">
  <defs>
    <pattern id="g3" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace}
      .disp{font-family:'Outfit','Segoe UI',system-ui,sans-serif}
    </style>
  </defs>

  <rect width="1000" height="625" fill="#0A0B0D"/>
  <rect width="1000" height="625" fill="url(#g3)"/>
  <rect x="32" y="32" width="936" height="561" rx="16" fill="#101216" fill-opacity="0.5" stroke="#ffffff" stroke-opacity="0.08"/>

  <g class="mono">
    <rect x="60" y="64" width="9" height="9" fill="#7f93c9"/>
    <text x="80" y="73" font-size="14" fill="#9A9CA3" letter-spacing="1">// interpretabilidad + decisión</text>
  </g>
  <text class="disp" x="60" y="116" font-size="30" font-weight="600" fill="#E8E9EC">¿Qué pesa en el riesgo y qué hacer?</text>

  <!-- SHAP importance -->
  <g transform="translate(60,164)">
    <text class="mono" x="0" y="0" font-size="13" fill="#9A9CA3" letter-spacing="1">importancia media |SHAP|</text>
    <g class="mono" font-size="13" fill="#c8cad1">
      <!-- bars: x from 250, max width 290 -->
      <text x="0" y="44">ratio_endeudamiento</text>
      <rect x="232" y="33" width="290" height="14" rx="3" fill="#E8E9EC" fill-opacity="0.92"/>
      <text x="532" y="44" fill="#9A9CA3">0.31</text>

      <text x="0" y="80">capacidad_pago</text>
      <rect x="232" y="69" width="232" height="14" rx="3" fill="#E8E9EC" fill-opacity="0.78"/>
      <text x="474" y="80" fill="#9A9CA3">0.25</text>

      <text x="0" y="116">ratio_solicitud_ingreso</text>
      <rect x="232" y="105" width="178" height="14" rx="3" fill="#E8E9EC" fill-opacity="0.64"/>
      <text x="420" y="116" fill="#9A9CA3">0.19</text>

      <text x="0" y="152">estrés_financiero</text>
      <rect x="232" y="141" width="138" height="14" rx="3" fill="#8ea0cf"/>
      <text x="380" y="152" fill="#9A9CA3">0.15</text>

      <text x="0" y="188">plazo_meses</text>
      <rect x="232" y="177" width="96" height="14" rx="3" fill="#8ea0cf" fill-opacity="0.8"/>
      <text x="338" y="188" fill="#9A9CA3">0.10</text>

      <text x="0" y="224">tipo_contrato</text>
      <rect x="232" y="213" width="58" height="14" rx="3" fill="#8ea0cf" fill-opacity="0.6"/>
      <text x="300" y="224" fill="#9A9CA3">0.06</text>
    </g>
    <line x1="232" y1="20" x2="232" y2="236" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>

  <!-- decision card -->
  <g transform="translate(632,168)">
    <line x1="-16" y1="-4" x2="-16" y2="350" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="14" y="0" width="300" height="350" rx="14" fill="#14171C" stroke="#ffffff" stroke-opacity="0.10"/>
    <g class="mono" font-size="12" fill="#9A9CA3">
      <text x="36" y="34">solicitud #4821 · scoring</text>
    </g>

    <!-- gauge arc -->
    <g transform="translate(164,118)" fill="none" stroke-linecap="round">
      <path d="M-78 0 A78 78 0 0 1 78 0" stroke="#2a2e37" stroke-width="12"/>
      <path d="M-78 0 A78 78 0 0 1 56 -54" stroke="#E8E9EC" stroke-width="12"/>
    </g>
    <text class="disp" x="164" y="120" font-size="44" font-weight="600" fill="#E8E9EC" text-anchor="middle">0.71</text>
    <text class="mono" x="164" y="146" font-size="12" fill="#9A9CA3" text-anchor="middle">P(desiste)</text>

    <g class="mono">
      <rect x="36" y="186" width="256" height="34" rx="8" fill="#0A0B0D" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="50" y="208" font-size="13" fill="#9A9CA3">nivel de riesgo</text>
      <text x="278" y="208" font-size="14" fill="#E8E9EC" text-anchor="end" letter-spacing="1">ALTO</text>
    </g>

    <g class="mono" font-size="13" fill="#c8cad1">
      <text x="36" y="252" fill="#9A9CA3">acción sugerida</text>
      <text x="36" y="278">contacto prioritario +</text>
      <text x="36" y="300">oferta de retención</text>
    </g>
    <g class="mono" font-size="12" fill="#6f727b">
      <text x="36" y="332">umbral 0.42 · prob. calibrada</text>
    </g>
  </g>

  <text class="mono" x="60" y="556" font-size="12.5" fill="#6f727b">Cada predicción se acompaña de su explicación local (SHAP) y una acción accionable para retención.</text>
</svg>
